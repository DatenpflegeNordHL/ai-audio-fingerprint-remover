services:
  audio-quality-humanizer-web:
    image: audio-quality-humanizer-web:0.17.0-private
    restart: unless-stopped
    env_file:
      - ../env/web.env.example
    ports:
      - "127.0.0.1:8017:8017"
    volumes:
      - aqh-private-web-jobs:/app/.var/private-web/jobs
    command:
      - uvicorn
      - audio_quality_humanizer.web.app:app
      - --host
      - 127.0.0.1
      - --port
      - "8017"

volumes:
  aqh-private-web-jobs:
